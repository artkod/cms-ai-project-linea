name: Deploy (frontend + admin)

# Builds the public frontend and the /admin SPA on a clean runner, then rsyncs
# both to the Opalstack static apps. The admin bundle is engine (cms-ai-core)
# code vendored into this repo, so the runner re-vendors a FRESH bundle every
# run — on a clean checkout the pnpm store is populated from the just-built
# bundle, so a stale admin bundle can never ship.
#
# Triggers:
#   - push to main            (this repo's frontend/admin source changed)
#   - repository_dispatch      (cms-ai-core pushed -> admin needs rebuilding)
#   - workflow_dispatch        (manual "Run workflow" button)

on:
  push:
    branches: [main]
  repository_dispatch:
    types: [core-updated]
  workflow_dispatch:

concurrency:
  group: deploy-linea
  cancel-in-progress: false

env:
  # Public build-time config — baked verbatim into the JS bundles, NOT secret.
  PROD_API_URL: https://cms5-api.artkod.opalstacked.com
  PROD_FRONTEND_URL: https://cms5.artkod.opalstacked.com
  # rsync destinations on the server (relative to the shell user's $HOME).
  ADMIN_DEST: apps/cms5-admin/public
  FRONTEND_DEST: apps/cms5-frontend/public

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout project (linea)
        uses: actions/checkout@v4
        with:
          path: cms-ai-project-linea

      - name: Checkout engine (cms-ai-core)
        uses: actions/checkout@v4
        with:
          repository: artkod/cms-ai-core
          ref: main
          token: ${{ secrets.GH_PAT }}
          path: cms-ai-core

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # Install ONLY admin-base + its workspace closure — skips the API's native
      # sharp build, which the admin bundle does not need. Not --frozen: core's
      # lockfile is generated by a different pnpm major and is only used here as
      # a build tool (never committed from CI), so tolerate minor drift.
      - name: Install engine deps (admin-base only)
        working-directory: cms-ai-core
        run: pnpm install --filter "@cms/admin-base..."

      - name: Vendor fresh admin-base bundle into linea
        working-directory: cms-ai-project-linea
        env:
          CMS_CORE_DIR: ${{ github.workspace }}/cms-ai-core
        run: pnpm vendor:admin-base

      # admin/ is a STANDALONE pnpm project (its own lockfile, NOT a member of
      # the repo-root workspace). Installing here populates the pnpm store copy
      # of the @cms/admin-base file: dependency from the bundle vendored above —
      # on a clean runner that copy is always fresh, so the stale-bundle bug
      # cannot recur.
      - name: Install admin deps
        working-directory: cms-ai-project-linea/admin
        run: pnpm install --frozen-lockfile

      - name: Build admin (base=/admin/)
        working-directory: cms-ai-project-linea/admin
        env:
          VITE_API_URL: ${{ env.PROD_API_URL }}
          VITE_FRONTEND_URL: ${{ env.PROD_FRONTEND_URL }}
        run: npx vite build --base=/admin/

      # The public frontend (repo root) has no @cms/* dependency, so skip both
      # its install and build when the run was triggered by a cms-ai-core push.
      - name: Install frontend deps
        if: github.event_name != 'repository_dispatch'
        working-directory: cms-ai-project-linea
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        if: github.event_name != 'repository_dispatch'
        working-directory: cms-ai-project-linea
        env:
          VITE_CMS_API_URL: ${{ env.PROD_API_URL }}
        run: pnpm build

      - name: Load deploy SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Trust server host key
        run: ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy admin
        run: |
          rsync -az --delete \
            cms-ai-project-linea/admin/dist/ \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${ADMIN_DEST}/"

      - name: Deploy frontend
        if: github.event_name != 'repository_dispatch'
        run: |
          rsync -az --delete \
            cms-ai-project-linea/dist/ \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${FRONTEND_DEST}/"

      - name: Smoke check (admin reachable)
        run: curl -fsS -o /dev/null "${PROD_FRONTEND_URL}/admin/" && echo "admin OK"
